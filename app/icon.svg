<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 108">
  <!-- Chimney -->
  <rect x="26" y="7" width="9" height="16" fill="#1E3A8A"/>

  <!-- Roof left slope (navy filled triangle) -->
  <polygon points="8,44 50,7 50,44" fill="#1E3A8A"/>

  <!-- Roof right slope (navy outline only — same navy) -->
  <polygon points="50,7 92,44 50,44" fill="#1E3A8A" opacity="0.15"/>
  <polyline points="50,7 92,44" fill="none" stroke="#1E3A8A" stroke-width="6.5" stroke-linecap="round"/>

  <!-- ── Stripe band 1 (widest) ── -->
  <polygon points="8,46 50,46 50,58 11,58" fill="#1E3A8A"/>
  <polygon points="50,46 92,46 89,58 50,58" fill="#3DC153"/>

  <!-- ── Stripe band 2 ── -->
  <polygon points="15,61 50,61 50,73 18,73" fill="#1E3A8A"/>
  <polygon points="50,61 85,61 82,73 50,73" fill="#3DC153"/>

  <!-- ── Stripe band 3 (narrowest) ── -->
  <polygon points="23,76 50,76 50,88 26,88" fill="#1E3A8A"/>
  <polygon points="50,76 77,76 74,88 50,88" fill="#3DC153"/>

  <!-- Rupee symbol (navy, centred in upper body) -->
  <text
    x="42" y="42"
    fill="#1E3A8A"
    font-size="24"
    font-weight="900"
    font-family="Arial, Helvetica, sans-serif"
  >₹</text>

  <!-- Green upward-right arrow -->
  <!-- Shaft -->
  <line x1="74" y1="86" x2="93" y2="20" stroke="#3DC153" stroke-width="7" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="93,20 83,29 97,32" fill="#3DC153"/>
</svg>

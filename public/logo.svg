<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" fill="none">
  <!-- House/Icon -->
  <g transform="translate(0, 0)">
    <!-- House roof -->
    <polygon points="30,5 8,22 52,22" fill="#1E3A8A"/>
    <!-- House body left wall -->
    <rect x="8" y="22" width="10" height="22" fill="#1E3A8A"/>
    <!-- House body right wall -->
    <rect x="42" y="22" width="10" height="22" fill="#1E3A8A"/>
    <!-- Rupee symbol circle bg -->
    <circle cx="30" cy="30" r="11" fill="white"/>
    <!-- Rupee ₹ symbol -->
    <text x="30" y="35" text-anchor="middle" font-family="Arial" font-weight="700" font-size="14" fill="#1E3A8A">₹</text>
    <!-- Upward green arrow -->
    <polygon points="44,10 50,20 47,20 47,28 41,28 41,20 38,20" fill="#22C55E"/>
    <!-- Stacked lines below house -->
    <rect x="10" y="46" width="40" height="4" rx="2" fill="#22C55E"/>
    <rect x="14" y="52" width="32" height="4" rx="2" fill="#22C55E" opacity="0.7"/>
    <rect x="18" y="58" width="24" height="3" rx="1.5" fill="#22C55E" opacity="0.4"/>
  </g>
  <!-- Wordmark -->
  <text x="62" y="38" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="26" fill="#1E3A8A" letter-spacing="-0.5">Best</text>
  <text x="113" y="38" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="26" fill="#1E3A8A" letter-spacing="-0.3">Loans</text>
</svg>
